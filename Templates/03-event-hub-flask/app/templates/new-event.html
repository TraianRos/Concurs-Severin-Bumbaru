{% extends "base.html" %}

{% block content %}
<section class="form-shell">
    <form method="post">
        <label>
            <span>Title</span>
            <input type="text" name="title" required>
        </label>
        <label>
            <span>Location</span>
            <input type="text" name="location" required>
        </label>
        <label>
            <span>Start date</span>
            <input type="text" name="start_date" placeholder="2026-04-03 12:00" required>
        </label>
        <label>
            <span>Seats</span>
            <input type="number" min="1" name="seats" required>
        </label>
        <button type="submit">Create event</button>
    </form>
</section>
{% endblock %}
