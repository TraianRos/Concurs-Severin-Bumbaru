{% extends "base.html" %}

{% block content %}
<section class="hero-shell">
    <div>
        <p class="hero-copy">Urmatoarele sesiuni planificate pentru demo local.</p>
        <a class="button-link" href="{{ url_for('web.new_event') }}">Add event</a>
    </div>
</section>

<section class="grid-shell">
    {% for event in events %}
        <article class="event-block">
            <h2>{{ event.title }}</h2>
            <p>{{ event.location }}</p>
            <p>{{ event.start_date }}</p>
            <a href="{{ url_for('web.event_detail', event_id=event.id) }}">Open detail</a>
        </article>
    {% endfor %}
</section>
{% endblock %}
