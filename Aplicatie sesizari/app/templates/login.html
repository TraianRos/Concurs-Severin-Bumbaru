{% extends "base.html" %}

{% block content %}
<section class="single-column">
    <article class="form-card narrow-card">
        <p class="eyebrow">Autentificare</p>
        <h1>Intra in platforma</h1>
        <p class="muted-text">Operatorii, administratorii si cetatenii folosesc aceeasi pagina de login.</p>

        <form method="post" class="form-grid">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" autocomplete="email" required>

            <label for="password">Parola</label>
            <input id="password" type="password" name="password" autocomplete="current-password" required>

            <button type="submit">Autentificare</button>
        </form>

        <p class="inline-hint">
            Nu ai cont?
            <a class="text-link" href="{{ url_for('web.register') }}">Creeaza unul acum</a>.
        </p>
    </article>
</section>
{% endblock %}
